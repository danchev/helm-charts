apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "unsloth.fullname" . }}-work
  labels:
    {{- include "unsloth.labels" . | nindent 4 }}
  {{- with .Values.persistence.work.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    - {{ .Values.persistence.work.accessMode }}
  {{- with .Values.persistence.work.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.work.size }}
---
