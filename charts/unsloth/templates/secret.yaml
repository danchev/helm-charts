{{- /*
Lookup existing secret to preserve passwords across helm upgrades.
On first install: use .Values.secrets.<KEY> if set, otherwise generate a random 16-char password.
On upgrade: always reuse the password already stored in the cluster secret.
SSH_KEY is optional — omitted from the secret entirely if empty.
*/ -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace (include "unsloth.fullname" .) -}}
{{- $jupyterPassword := "" -}}
{{- $userPassword := "" -}}
{{- if $existingSecret -}}
  {{- $jupyterPassword = index $existingSecret.data "JUPYTER_PASSWORD" | b64dec -}}
  {{- $userPassword = index $existingSecret.data "USER_PASSWORD" | b64dec -}}
{{- else -}}
  {{- $jupyterPassword = .Values.secrets.JUPYTER_PASSWORD | default (randAlphaNum 16) -}}
  {{- $userPassword = .Values.secrets.USER_PASSWORD | default (randAlphaNum 16) -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "unsloth.fullname" . }}
  labels:
    {{- include "unsloth.labels" . | nindent 4 }}
type: Opaque
data:
  JUPYTER_PASSWORD: {{ $jupyterPassword | b64enc | quote }}
  USER_PASSWORD: {{ $userPassword | b64enc | quote }}
  {{- with .Values.secrets.SSH_KEY }}
  SSH_KEY: {{ . | b64enc | quote }}
  {{- end }}
