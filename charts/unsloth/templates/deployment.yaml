apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "unsloth.fullname" . }}
  labels:
    {{- include "unsloth.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "unsloth.selectorLabels" . | nindent 6 }}
  strategy:
    type: Recreate
  revisionHistoryLimit: 3
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "unsloth.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "unsloth.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.runtimeClassName }}
      runtimeClassName: {{ . }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: studio
              containerPort: {{ .Values.ports.studio }}
              protocol: TCP
            - name: jupyterlab
              containerPort: {{ .Values.ports.jupyterlab }}
              protocol: TCP
            - name: ssh
              containerPort: {{ .Values.ports.ssh }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "unsloth.fullname" . }}
            - secretRef:
                name: {{ include "unsloth.fullname" . }}
          startupProbe:
            tcpSocket:
              port: studio
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
          readinessProbe:
            tcpSocket:
              port: studio
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          livenessProbe:
            tcpSocket:
              port: studio
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: work
              mountPath: /workspace/work
            - name: models
              mountPath: /workspace/.cache/huggingface
            {{- if .Values.persistence.notebooks.enabled }}
            - name: notebooks
              mountPath: /workspace/notebooks
            {{- end }}
      volumes:
        - name: work
          persistentVolumeClaim:
            claimName: {{ include "unsloth.fullname" . }}-work
        - name: models
          persistentVolumeClaim:
            claimName: {{ include "unsloth.fullname" . }}-models
        {{- if .Values.persistence.notebooks.enabled }}
        - name: notebooks
          persistentVolumeClaim:
            claimName: {{ include "unsloth.fullname" . }}-notebooks
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
