{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "unsloth.fullname" . }}
  labels:
    {{- include "unsloth.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "unsloth.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic from pods in the same namespace (e.g. port-forward, same-ns clients)
    - from:
        - podSelector: {}
      ports:
        - port: {{ .Values.ports.studio }}
          protocol: TCP
        - port: {{ .Values.ports.jupyterlab }}
          protocol: TCP
    # Allow traffic from ingress-controller namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: {{ .Values.ports.studio }}
          protocol: TCP
    {{- with .Values.networkPolicy.extraIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
